<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>אזור ניהול | YARIN.MALKA</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a16;
  --bg-soft: #12122a;
  --accent: #6C3CE1;
  --accent-light: #a78bfa;
  --accent-dark: #4F2EAB;
  --text: #f3f3f7;
  --text2: #b0b0bd;
  --text3: #7a7a88;
  --glass: rgba(255,255,255,0.035);
  --glass-border: rgba(255,255,255,0.075);
  --green: #10B981;
  --red: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Heebo', system-ui, sans-serif;
  font-weight: 300;
  line-height: 1.6;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; inset: -10%; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 50% 35% at 80% 5%, rgba(108,60,225,0.18) 0%, transparent 55%),
              radial-gradient(ellipse 45% 35% at 5% 90%, rgba(59,130,246,0.10) 0%, transparent 55%);
}
.app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; position: relative; z-index: 1; }
aside {
  background: rgba(10,10,22,0.6);
  backdrop-filter: blur(20px);
  border-left: 1px solid var(--glass-border);
  padding: 28px 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.brand { font-family: 'Inter'; font-weight: 700; font-size: 18px; letter-spacing: -0.02em; margin-bottom: 26px; padding: 0 8px; }
.brand .dot { color: var(--accent); }
.brand small { display: block; font-family: 'Inter'; font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 4px; }
.nav-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: 10px;
  color: var(--text2);
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  background: transparent;
  border: none;
  text-align: start;
  transition: all 0.2s;
}
.nav-btn:hover { background: rgba(108,60,225,0.08); color: var(--text); }
.nav-btn.active { background: rgba(108,60,225,0.15); color: var(--accent-light); }
.nav-btn svg { width: 18px; height: 18px; }
.spacer { flex: 1; }
.user-card { padding: 12px 14px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; font-size: 12px; color: var(--text3); }
.user-card strong { color: var(--text); display: block; margin-top: 4px; word-break: break-all; font-weight: 500; }

main { padding: 36px 44px; max-width: 1100px; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
.sub { color: var(--text3); font-size: 14px; margin-bottom: 28px; }

.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
.stat {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 20px 22px;
  backdrop-filter: blur(20px);
}
.stat-l { font-family: 'Inter'; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
.stat-v { font-size: 28px; font-weight: 700; }

.card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px; padding: 24px; backdrop-filter: blur(20px); margin-bottom: 16px; }
.card h2 { font-size: 18px; font-weight: 700; margin-bottom: 14px; }

.btn { padding: 10px 20px; border-radius: 10px; border: none; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
.btn-p { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; }
.btn-p:hover { box-shadow: 0 0 24px rgba(108,60,225,0.5); transform: translateY(-1px); }
.btn-p:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.btn-s { background: var(--glass); color: var(--text); border: 1px solid var(--glass-border); }
.btn-s:hover { background: rgba(108,60,225,0.1); border-color: var(--accent); }
.btn-d { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
.btn-d:hover { background: rgba(239,68,68,0.2); }
.btn-icon { padding: 8px 10px; }

.proj-row { display: grid; grid-template-columns: 72px 1fr auto; gap: 16px; align-items: center; padding: 14px; border-radius: 12px; border: 1px solid transparent; margin-bottom: 8px; transition: border-color 0.2s; }
.proj-row:hover { border-color: var(--glass-border); background: rgba(255,255,255,0.02); }
.proj-row img { width: 72px; height: 48px; object-fit: cover; border-radius: 6px; background: #000; }
.proj-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.proj-info .badge { display: inline-block; padding: 2px 10px; background: rgba(108,60,225,0.12); border: 1px solid rgba(108,60,225,0.3); border-radius: 999px; font-size: 10px; color: var(--accent-light); margin-inline-end: 8px; font-family: 'Inter'; }
.proj-info p { font-size: 12px; color: var(--text3); margin-top: 4px; }

.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.open { display: flex; }
.modal { background: #1a1a2e; border: 1px solid var(--glass-border); border-radius: 18px; padding: 30px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 20px; margin-bottom: 18px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.field input, .field textarea, .field select { width: 100%; padding: 10px 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 14px; }
.field textarea { min-height: 80px; resize: vertical; }
.field input:focus, .field textarea:focus, .field select:focus { outline: 2px solid var(--accent); outline-offset: 2px; border-color: transparent; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-check { display: flex; align-items: center; gap: 8px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; }
.field-check input { width: auto; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--glass-border); }

.loading { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--accent-light); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; top: 20px; right: 50%; transform: translateX(50%); padding: 14px 22px; background: var(--green); color: #fff; border-radius: 12px; z-index: 200; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; font-weight: 500; }
.toast.show { opacity: 1; transform: translateX(50%) translateY(8px); }
.toast.err { background: var(--red); }

.empty { padding: 40px; text-align: center; color: var(--text3); }

@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  aside { display: none; }
  main { padding: 20px; }
  .stat-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="app">

  <aside>
    <div class="brand">YARIN<span class="dot">.</span>MALKA<small>Admin Console</small></div>
    <button class="nav-btn active" data-view="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      <span>סקירה</span>
    </button>
    <button class="nav-btn" data-view="projects">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v16M3 21h18M5 11h2v3H5zm6 0h2v3h-2zm6 0h2v3h-2z"/></svg>
      <span>פרויקטים</span>
    </button>
    <div class="spacer"></div>
    <a href="/" style="text-decoration:none;">
      <button class="nav-btn" style="width:100%">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        <span>חזרה לאתר</span>
      </button>
    </a>
    <div class="user-card">
      מחובר<strong id="userEmail">...</strong>
    </div>
  </aside>

  <main>
    <div id="view-dashboard" class="view">
      <h1>סקירה כללית</h1>
      <p class="sub">תמונת מצב מהירה של האתר</p>

      <div class="stat-grid">
        <div class="stat"><div class="stat-l">פרויקטים בסך הכל</div><div class="stat-v" id="statTotal">-</div></div>
        <div class="stat"><div class="stat-l">מוצגים בעמוד הבית</div><div class="stat-v" id="statFeatured">-</div></div>
        <div class="stat"><div class="stat-l">סטטוס</div><div class="stat-v" style="font-size:18px; color:var(--green)" id="statStatus">טוען...</div></div>
      </div>

      <div class="card">
        <h2>פעולות מהירות</h2>
        <button class="btn btn-p" onclick="navigate('projects')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          הוסף פרויקט חדש
        </button>
      </div>
    </div>

    <div id="view-projects" class="view" style="display:none">
      <h1>פרויקטים</h1>
      <p class="sub">עריכה, הוספה, ומחיקה. כל שינוי נשמר ישירות לאתר תוך 30 שניות</p>

      <button class="btn btn-p" style="margin-bottom:16px" onclick="openProject()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        פרויקט חדש
      </button>

      <div class="card">
        <div id="projectList"><div class="empty">טוען...</div></div>
      </div>
    </div>
  </main>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">פרויקט</h2>
    <form id="projForm">
      <div class="field"><label>מזהה (slug באנגלית, ייחודי)</label><input name="id" required pattern="[a-z0-9-]+" placeholder="example-project"></div>
      <div class="field"><label>שם הפרויקט</label><input name="title" required placeholder="שם בעברית או באנגלית"></div>
      <div class="field"><label>קישור</label><input name="url" type="url" required placeholder="https://..."></div>
      <div class="field"><label>תמונה (נתיב יחסי)</label><input name="image" placeholder="assets/project-name.jpg"></div>
      <div class="field-row">
        <div class="field"><label>תגית (Badge)</label><input name="badge" placeholder="אתר עסקי"></div>
        <div class="field"><label>שנה</label><input name="year" placeholder="2026"></div>
      </div>
      <div class="field"><label>תיאור</label><textarea name="description" required></textarea></div>
      <div class="field"><label>סגנון תמונה (CSS אופציונלי)</label><input name="imageStyle" placeholder="object-position:top"></div>
      <div class="field-check"><input type="checkbox" name="featured" id="featuredCheck"><label for="featuredCheck">הצג בעמוד הבית (Featured)</label></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-d" id="deleteBtn" style="display:none" onclick="deleteProj()">מחק</button>
        <div style="display:flex; gap:8px; margin-inline-start:auto;">
          <button type="button" class="btn btn-s" onclick="closeModal()">ביטול</button>
          <button type="submit" class="btn btn-p" id="saveBtn">שמור</button>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const state = { projects: [], editingId: null };

function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' err' : '');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function navigate(view) {
  document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
  document.querySelectorAll('.nav-btn[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.getElementById('view-' + view).style.display = 'block';
}
document.querySelectorAll('.nav-btn[data-view]').forEach(b => b.addEventListener('click', () => navigate(b.dataset.view)));

async function loadMe() {
  try {
    const r = await fetch('/api/admin/me');
    const d = await r.json();
    document.getElementById('userEmail').textContent = d.email || 'לא ידוע';
  } catch (e) {
    document.getElementById('userEmail').textContent = 'שגיאה';
  }
}

async function loadProjects() {
  try {
    const r = await fetch('/api/admin/projects');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    state.projects = d.projects || [];
    renderProjects();
    document.getElementById('statTotal').textContent = state.projects.length;
    document.getElementById('statFeatured').textContent = state.projects.filter(p => p.featured).length;
    document.getElementById('statStatus').textContent = 'תקין';
  } catch (e) {
    document.getElementById('projectList').innerHTML = '<div class="empty">שגיאה בטעינה: ' + e.message + '</div>';
    document.getElementById('statStatus').textContent = 'שגיאה';
    document.getElementById('statStatus').style.color = 'var(--red)';
  }
}

function renderProjects() {
  const list = document.getElementById('projectList');
  if (state.projects.length === 0) {
    list.innerHTML = '<div class="empty">אין פרויקטים עדיין</div>';
    return;
  }
  list.innerHTML = state.projects.map(p => `
    <div class="proj-row">
      <img src="/${p.image || 'assets/og-image.png'}" alt="">
      <div class="proj-info">
        <h3>${escapeHtml(p.title)}</h3>
        <div><span class="badge">${escapeHtml(p.badge || '')}</span>${p.featured ? '<span class="badge" style="background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.3);color:#6ee7b7">Featured</span>' : ''}<span style="font-size:12px;color:var(--text3)">· ${p.year || ''}</span></div>
        <p>${escapeHtml(p.description || '')}</p>
      </div>
      <div>
        <button class="btn btn-s btn-icon" onclick="openProject('${p.id}')" aria-label="ערוך">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

function escapeHtml(s) { return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function openProject(id) {
  const form = document.getElementById('projForm');
  form.reset();
  state.editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'עריכת פרויקט' : 'פרויקט חדש';
  document.getElementById('deleteBtn').style.display = id ? 'inline-flex' : 'none';
  document.querySelector('[name="id"]').readOnly = !!id;
  if (id) {
    const p = state.projects.find(x => x.id === id);
    if (p) {
      Object.entries(p).forEach(([k, v]) => {
        const el = form.elements[k];
        if (!el) return;
        if (el.type === 'checkbox') el.checked = !!v;
        else el.value = v;
      });
    }
  }
  document.getElementById('modalBg').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  state.editingId = null;
}

document.getElementById('modalBg').addEventListener('click', (e) => {
  if (e.target.id === 'modalBg') closeModal();
});

document.getElementById('projForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span> שומר...';
  try {
    const fd = new FormData(e.target);
    const data = {};
    fd.forEach((v, k) => { data[k] = v; });
    data.featured = !!e.target.featured.checked;
    if (data.year) data.year = data.year.toString();

    let newProjects;
    if (state.editingId) {
      newProjects = state.projects.map(p => p.id === state.editingId ? { ...p, ...data } : p);
    } else {
      if (state.projects.find(p => p.id === data.id)) throw new Error('מזהה כבר קיים');
      newProjects = [...state.projects, data];
    }

    const r = await fetch('/api/admin/projects', {
      method: 'PUT',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ projects: newProjects, message: state.editingId ? `Update project: ${data.id}` : `Add project: ${data.id}` }),
    });
    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.error || 'שגיאה');
    }
    state.projects = newProjects;
    renderProjects();
    document.getElementById('statTotal').textContent = state.projects.length;
    document.getElementById('statFeatured').textContent = state.projects.filter(p => p.featured).length;
    closeModal();
    toast('נשמר! האתר יעדכן תוך 30 שניות');
  } catch (e) {
    toast(e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'שמור';
  }
});

async function deleteProj() {
  if (!state.editingId) return;
  if (!confirm('למחוק את הפרויקט הזה?')) return;
  const btn = document.getElementById('deleteBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>';
  try {
    const newProjects = state.projects.filter(p => p.id !== state.editingId);
    const r = await fetch('/api/admin/projects', {
      method: 'PUT',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ projects: newProjects, message: `Delete project: ${state.editingId}` }),
    });
    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.error || 'שגיאה');
    }
    state.projects = newProjects;
    renderProjects();
    document.getElementById('statTotal').textContent = state.projects.length;
    document.getElementById('statFeatured').textContent = state.projects.filter(p => p.featured).length;
    closeModal();
    toast('הפרויקט נמחק');
  } catch (e) {
    toast(e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'מחק';
  }
}

loadMe();
loadProjects();
</script>
</body>
</html>
