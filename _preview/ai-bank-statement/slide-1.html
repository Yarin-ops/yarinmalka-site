<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Karantina:wght@700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1080px; height: 1920px; overflow: hidden; }
body {
  font-family: 'Heebo', system-ui, sans-serif;
  background: #050508; color: #f0f0f0;
  padding: 100px 90px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
body::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 80% 15%, rgba(108, 60, 225, 0.32) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 10% 85%, rgba(59, 130, 246, 0.20) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: ''; position: absolute; inset: 0;
  background-image: radial-gradient(circle at center, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 30px 30px; pointer-events: none; z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
}
.content { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100%; }
.top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
.tag {
  background: rgba(108, 60, 225, 0.15); color: #c4b3ff;
  border: 1px solid rgba(108, 60, 225, 0.4);
  padding: 14px 30px; border-radius: 999px;
  font-size: 26px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  font-family: 'Inter', sans-serif; backdrop-filter: blur(20px);
}
.page-num {
  font-family: 'Inter', sans-serif; font-size: 26px; color: #888;
  font-weight: 500; letter-spacing: 0.15em;
}
.kicker {
  font-family: 'Inter', sans-serif; font-size: 28px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #c4b3ff; margin-bottom: 22px; font-weight: 600;
}
.h {
  font-family: 'Karantina', sans-serif;
  font-weight: 700;
  font-size: 152px; line-height: 0.92;
  letter-spacing: -0.02em;
  margin-bottom: 30px;
  color: #fff;
}
.h .accent {
  background: linear-gradient(135deg, #c4b3ff 0%, #8B5CF6 50%, #6C3CE1 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: inline-block;
}
.body {
  font-size: 32px; line-height: 1.5; font-weight: 300;
  color: #cbd5e1; margin-bottom: 40px;
}
.body strong {
  color: #f0f0f0; font-weight: 600;
}
.screen-wrap {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  position: relative;
}
.screen-frame {
  width: 100%;
  border-radius: 20px;
  padding: 12px;
  background: linear-gradient(135deg, rgba(108,60,225,0.25), rgba(59,130,246,0.15));
  border: 1px solid rgba(108,60,225,0.45);
  box-shadow:
    0 30px 80px rgba(108,60,225,0.30),
    0 12px 40px rgba(0,0,0,0.5);
  position: relative;
  transform: rotate(-1.2deg);
}
.screen-frame img {
  width: 100%;
  display: block;
  border-radius: 12px;
}
.screen-frame::after {
  content: 'CLAUDE.AI';
  position: absolute;
  top: -16px; right: 30px;
  font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.25em;
  color: #c4b3ff;
  background: #050508;
  padding: 4px 14px;
  border-radius: 6px;
  border: 1px solid rgba(108,60,225,0.4);
}
.foot {
  margin-top: 36px; padding-top: 32px;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; justify-content: space-between; align-items: center;
}
.mark-block { display: flex; flex-direction: column; gap: 8px; }
.mark {
  font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 300;
  letter-spacing: 0.4em; color: #f0f0f0; text-transform: uppercase;
}
.mark .dot { color: #6C3CE1; text-shadow: 0 0 12px rgba(108, 60, 225, 0.8); font-weight: 700; }
.tagline {
  font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
  letter-spacing: 0.35em; color: #6C3CE1; text-transform: uppercase;
}
.tagline .sep { color: #444; margin: 0 6px; }
.swipe {
  font-family: 'Inter', sans-serif; font-size: 22px; color: #888;
  font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase;
  display: flex; align-items: center; gap: 12px;
}
.swipe::before { content: '←'; font-size: 28px; color: #c4b3ff; }
</style>
</head>
<body>
<div class="content">
  <div class="top-row">
    <div class="tag">AI · ACADEMY</div>
    <div class="page-num" dir="ltr">1 / 4</div>
  </div>

  <div class="kicker">דוח בנקאי + AI</div>
  <div class="h">200 שורות.<br><span class="accent">5 תובנות.</span></div>
  <div class="body">
    תעלה דוח בנקאי ל-Claude. תשאל בעברית. <strong>תקבל את מה שאף רואה חשבון לא נותן לך</strong> - תוך 10 דקות.
  </div>

  <div class="screen-wrap">
    <div class="screen-frame">
      <img src="screenshots/screenshot-1.png" alt="Claude analysing bank statement">
    </div>
  </div>

  <div class="foot">
    <div class="mark-block">
      <div class="mark">YARIN<span class="dot">.</span>MALKA</div>
      <div class="tagline">AI<span class="sep">·</span>TECH<span class="sep">·</span>TOOLS</div>
    </div>
    <div class="swipe">SWIPE 2/4</div>
  </div>
</div>
</body>
</html>
