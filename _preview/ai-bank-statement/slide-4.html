<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Karantina:wght@700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1080px; height: 1920px; overflow: hidden; }
body {
  font-family: 'Heebo', system-ui, sans-serif;
  background: #050508; color: #f0f0f0;
  padding: 100px 90px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
body::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%, rgba(108, 60, 225, 0.32) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(59, 130, 246, 0.22) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: ''; position: absolute; inset: 0;
  background-image: radial-gradient(circle at center, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 30px 30px; pointer-events: none; z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
}
.content { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100%; }
.top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 36px; }
.tag {
  background: rgba(108, 60, 225, 0.15); color: #c4b3ff;
  border: 1px solid rgba(108, 60, 225, 0.4);
  padding: 14px 30px; border-radius: 999px;
  font-size: 26px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  font-family: 'Inter', sans-serif;
}
.page-num {
  font-family: 'Inter', sans-serif; font-size: 26px; color: #888;
  font-weight: 500; letter-spacing: 0.15em;
}
.kicker {
  font-family: 'Inter', sans-serif; font-size: 26px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #c4b3ff; margin-bottom: 18px; font-weight: 600;
}
.h {
  font-family: 'Karantina', sans-serif;
  font-weight: 700;
  font-size: 132px; line-height: 0.92;
  letter-spacing: -0.02em;
  margin-bottom: 28px;
  color: #fff;
}
.h .accent {
  background: linear-gradient(135deg, #c4b3ff, #6C3CE1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.body {
  font-size: 28px; line-height: 1.5; font-weight: 300;
  color: #cbd5e1; margin-bottom: 28px;
}
.body strong { color: #f0f0f0; font-weight: 600; }

.screen-frame {
  width: 100%;
  border-radius: 18px;
  padding: 10px;
  background: linear-gradient(135deg, rgba(108,60,225,0.25), rgba(59,130,246,0.15));
  border: 1px solid rgba(108,60,225,0.45);
  box-shadow: 0 24px 60px rgba(108,60,225,0.28), 0 10px 32px rgba(0,0,0,0.5);
  margin-bottom: 36px;
  position: relative;
}
.screen-frame img { width: 100%; display: block; border-radius: 10px; }
.screen-frame::after {
  content: 'CHATGPT';
  position: absolute; top: -16px; right: 30px;
  font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 0.25em;
  color: #c4b3ff; background: #050508;
  padding: 4px 14px; border-radius: 6px;
  border: 1px solid rgba(108,60,225,0.4);
}

.steps {
  display: flex; flex-direction: column; gap: 18px;
  margin-bottom: 32px;
}
.step {
  display: flex; align-items: center; gap: 22px;
  padding: 18px 24px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-right: 3px solid #6C3CE1;
  border-radius: 16px;
}
.step-num {
  flex-shrink: 0;
  width: 56px; height: 56px;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(108, 60, 225, 0.30), rgba(59, 130, 246, 0.20));
  border: 1px solid rgba(108, 60, 225, 0.5);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Karantina', sans-serif;
  font-size: 38px; color: #c4b3ff; font-weight: 700;
}
.step-text { font-size: 26px; line-height: 1.4; color: #cbd5e1; font-weight: 400; }
.step-text strong { color: #f0f0f0; font-weight: 600; }

.cta-block {
  margin-top: auto;
  padding: 30px 36px;
  background: linear-gradient(135deg, rgba(108, 60, 225, 0.18), rgba(59, 130, 246, 0.10));
  border: 2px solid rgba(108, 60, 225, 0.45);
  border-radius: 24px;
  text-align: center;
}
.cta-line {
  font-family: 'Heebo', sans-serif;
  font-size: 26px; color: #cbd5e1;
  margin-bottom: 8px;
}
.cta-url {
  font-family: 'Inter', sans-serif;
  font-size: 32px; font-weight: 700;
  background: linear-gradient(135deg, #c4b3ff, #6C3CE1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.04em;
}

.foot {
  margin-top: 32px; padding-top: 28px;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; justify-content: space-between; align-items: center;
}
.mark-block { display: flex; flex-direction: column; gap: 8px; }
.mark { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 300; letter-spacing: 0.4em; color: #f0f0f0; text-transform: uppercase; }
.mark .dot { color: #6C3CE1; text-shadow: 0 0 12px rgba(108, 60, 225, 0.8); font-weight: 700; }
.tagline { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.35em; color: #6C3CE1; text-transform: uppercase; }
.tagline .sep { color: #444; margin: 0 6px; }
.last-note {
  font-family: 'Inter', sans-serif; font-size: 22px; color: #c4b3ff;
  font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
}
</style>
</head>
<body>
<div class="content">
  <div class="top-row">
    <div class="tag">AI · ACADEMY</div>
    <div class="page-num" dir="ltr">4 / 4</div>
  </div>

  <div class="kicker">תקציב לחודש הבא</div>
  <div class="h">10 דקות.<br><span class="accent">תוצאה לחיים.</span></div>

  <div class="screen-frame">
    <img src="screenshots/screenshot-4.png" alt="Claude budget recommendation">
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">הורד דוח בנקאי <strong>(PDF/CSV)</strong></div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">השחר פרטים מזהים <strong>(5 דקות)</strong></div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">פתח <strong>claude.ai</strong>, גרור, שאל</div>
    </div>
  </div>

  <div class="cta-block">
    <div class="cta-line">המדריך השלם + 5 הפרומפטים:</div>
    <div class="cta-url">yarinmalka.co.il/guides</div>
  </div>

  <div class="foot">
    <div class="mark-block">
      <div class="mark">YARIN<span class="dot">.</span>MALKA</div>
      <div class="tagline">AI<span class="sep">·</span>TECH<span class="sep">·</span>TOOLS</div>
    </div>
    <div class="last-note">END</div>
  </div>
</div>
</body>
</html>
