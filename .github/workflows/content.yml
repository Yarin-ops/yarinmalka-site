name: Weekly guide autopilot

on:
  schedule:
    - cron: '0 6 * * 0'   # every Sunday ~08:00-09:00 Israel time
  workflow_dispatch: {}

permissions:
  contents: write
  deployments: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate weekly guide
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node content-bot/generate-guide.js

      - name: Commit & push
        id: commit
        run: |
          git config user.name "content-bot"
          git config user.email "bot@yarinmalka.co.il"
          git add guides.html guides/ sitemap.xml content-bot/backlog.md content-bot/output/ assets/guide-covers/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Weekly guide: $(date +%F)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=yarinmalka --branch=main --commit-dirty=true
