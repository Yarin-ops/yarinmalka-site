<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f3d"/>
      <stop offset="55%" stop-color="#0d0625"/>
      <stop offset="100%" stop-color="#06031a"/>
    </linearGradient>
    <linearGradient id="yGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e9deff"/>
      <stop offset="100%" stop-color="#9d7df7"/>
    </linearGradient>
    <linearGradient id="yShade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(60,30,120,0.35)"/>
    </linearGradient>
    <radialGradient id="dotGrad" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#d4c4ff"/>
      <stop offset="80%" stop-color="#6C3CE1"/>
      <stop offset="100%" stop-color="#3a1f8a"/>
    </radialGradient>
    <radialGradient id="topShine" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="bottomGlow" cx="50%" cy="100%" r="65%">
      <stop offset="0%" stop-color="rgba(108,60,225,0.45)"/>
      <stop offset="100%" stop-color="rgba(108,60,225,0)"/>
    </radialGradient>
    <clipPath id="rounded">
      <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>
    <rect width="1024" height="1024" fill="url(#bottomGlow)"/>
    <rect width="1024" height="1024" fill="url(#topShine)"/>

    <g transform="translate(0,30)">
      <path d="M 200 180
               L 400 180
               L 512 460
               L 624 180
               L 824 180
               L 600 700
               L 600 850
               L 424 850
               L 424 700
               Z"
            fill="url(#yGrad)"/>
      <path d="M 200 180
               L 400 180
               L 512 460
               L 624 180
               L 824 180
               L 600 700
               L 600 850
               L 424 850
               L 424 700
               Z"
            fill="url(#yShade)"/>
      <path d="M 200 180
               L 400 180
               L 512 460
               L 624 180
               L 824 180
               L 600 700
               L 600 850
               L 424 850
               L 424 700
               Z"
            fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
    </g>

    <circle cx="688" cy="868" r="68" fill="rgba(108,60,225,0.5)" filter="blur(28px)"/>
    <circle cx="688" cy="868" r="62" fill="url(#dotGrad)"/>
    <circle cx="688" cy="868" r="62" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <ellipse cx="670" cy="844" rx="20" ry="14" fill="rgba(255,255,255,0.7)"/>

    <rect x="6" y="6" width="1012" height="1012" rx="216" ry="216"
          fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <rect x="14" y="14" width="996" height="996" rx="210" ry="210"
          fill="none" stroke="rgba(108,60,225,0.35)" stroke-width="2"/>
  </g>
</svg>
